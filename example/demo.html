<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EditContext API Demo</title>

  <style>
    body {
      font-family: system-ui;
      font-size: 1rem;
      margin: 2rem;
    }

    #div-editor {
      font-family: consolas, monospace;
      background: #e0e0e0;
      border-radius: .5rem;
      padding: 1rem;
      position: relative;
      margin: 2rem 0;
      line-height: 2;
    }

    #div-editor.is-composing {
      background: lightblue;
    }

    #div-editor.is-composing::before {
      content: "Composing";
      font-size: .6rem;
      position: absolute;
      inset-block-start: 0;
      inset-inline-end: 0;
      padding: .2rem;
      background: #0003;
      border-radius: 0 .5rem;
    }

    #div-editor .space {
      white-space: pre-wrap;
      background: radial-gradient(circle, #0004 2px, transparent 0);
    }

    .word.rainbow {
      background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .word.yell {
      background: yellow;
      text-transform: uppercase;
      font-weight: bold;
      font-size: 1.3em;
    }

    .word.pink {
      background: pink;
      font-style: italic;
    }

    .word.flower {
      background-image: url(ms-demo/flower.png);
      padding: 0 0 0.8rem 0;
      background-size: 1ch;
      background-repeat: repeat-x;
      background-position: bottom;
      position: relative;
      top: -.8rem;
    }

    .word.rotate {
      transform: rotate(180deg);
      display: inline-block;
      font-weight: bold;
    }

    .word.shadow {
      text-shadow: 1px 1px 0 red,
        2px 2px 0 violet,
        3px 3px 0 blue,
        4px 4px 0 green,
        5px 5px 0 yellow,
        6px 6px 0 orange,
        7px 7px 0 red;
    }

    .word.brick {
      padding: 0.2rem;
      background: #999;
      border: solid 5px;
      border-color: #444 #111 #555 #777;
      text-shadow: 1px 1px 0px #ccc;
    }

    .word.fire {
      background-image: url(ms-demo/fire.gif);
      padding: 0 0 0.8rem 0;
      background-size: 15px;
      background-repeat: repeat-x;
      background-position: bottom;
      position: relative;
      top: -0.8rem;
      background-color: black;
      color: gold;
    }

    ::highlight(ime-format-solid-thin) { text-decoration: underline 1px; }
    ::highlight(ime-format-solid-thick) { text-decoration: underline 2px; }
    ::highlight(ime-format-dotted-thin) { text-decoration: underline dotted 1px; }
    ::highlight(ime-format-dotted-thick) { text-decoration: underline dotted 2px; }
    ::highlight(ime-format-dashed-thin) { text-decoration: underline dashed 1px; }
    ::highlight(ime-format-dashed-thick) { text-decoration: underline dashed 2px; }
    ::highlight(ime-format-wavy-thin) { text-decoration: underline wavy 1px; }
    ::highlight(ime-format-wavy-thick) { text-decoration: underline wavy 2px; }
    ::highlight(ime-format-squiggle-thin) { text-decoration: underline wavy 1px; }
    ::highlight(ime-format-squiggle-thick) { text-decoration: underline wavy 2px; }
    ::highlight(ime-format-double-thin) { text-decoration: underline double 1px; }
    ::highlight(ime-format-double-thick) { text-decoration: underline double 2px; }
  </style>
</head>

<body>
  <h1>EditContext API Demo</h1>
  <p id="editor-help">Focus the editor below and start typing. Each word gets a unique visual effect.<br>
  Based on <a href="https://microsoftedge.github.io/Demos/edit-context/html-demo.html">Microsoft's EditContext demo</a>.</p>

  <div
    id="div-editor"
    role="textbox"
    aria-label="EditContext demo editor"
    aria-describedby="editor-help"
    aria-multiline="true"
    tabindex="0"
    spellcheck="false"
  ></div>

  <script>
    // Conditionally load polyfill if ?polyfill is in query string
    if (new URLSearchParams(location.search).has("polyfill")) {
      const s = document.createElement("script");
      s.src = "editcontext-polyfill.iife.js";
      s.dataset.force = "";  // Force polyfill even when native EditContext exists
      s.onload = () => init();
      s.onerror = () => init();
      document.head.appendChild(s);
    } else {
      init();
    }

    function init() {
      const IS_EDIT_CONTEXT_SUPPORTED = 'EditContext' in window;
      const IS_CUSTOM_HIGHLIGHT_SUPPORTED = 'Highlight' in window;

      const INIT_TEXT = "Welcome to the EditContext demo! Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vestibulum commodo elit augue, non malesuada ante facilisis vel.";
      const INIT_SELECTION_START = INIT_TEXT.length;
      const INIT_SELECTION_END = INIT_TEXT.length;

      const WORD_EFFECTS = [
        "rainbow", "yell", "pink", "flower",
        "rotate", "shadow", "brick", "fire",
      ];

      const editor = document.querySelector("#div-editor");
      let selectionAnchor = INIT_SELECTION_START;
      let selectionFocus = INIT_SELECTION_END;

      if (!IS_EDIT_CONTEXT_SUPPORTED) {
        editor.textContent = "Sorry, your browser doesn't support the EditContext API. This demo will not work.";
        return;
      }

      const editContext = new EditContext({ text: INIT_TEXT, selectionStart: INIT_SELECTION_START, selectionEnd: INIT_SELECTION_END });
      editor.editContext = editContext;

      function render() {
        editor.innerHTML = "";

        let wordIndex = 0;
        const tokens = editContext.text.match(/\S+|\s+/gu) || [];
        for (const token of tokens) {
          if (isWhitespace(token)) {
            const sSpan = document.createElement("span");
            sSpan.classList.add("space");
            sSpan.textContent = token;
            editor.appendChild(sSpan);
            continue;
          }

          const wSpan = document.createElement("span");
          wSpan.classList.add("word");
          wSpan.classList.add(WORD_EFFECTS[wordIndex % WORD_EFFECTS.length]);
          wSpan.textContent = token;
          editor.appendChild(wSpan);
          wordIndex++;
        }

        const selection = document.getSelection();
        if (!selection) return;
        selection.removeAllRanges();
        const anchor = getPositionFromOffset(selectionAnchor);
        const focus = getPositionFromOffset(selectionFocus);
        const range = getRangeFromStartEnd(
          Math.min(selectionAnchor, selectionFocus),
          Math.max(selectionAnchor, selectionFocus),
        );
        selection.addRange(range);
        if (selection.setBaseAndExtent) {
          selection.setBaseAndExtent(anchor.node, anchor.offset, focus.node, focus.offset);
        }
        updateSelectionBounds();
      }

      editContext.addEventListener("textupdate", e => {
        selectionAnchor = e.selectionStart;
        selectionFocus = e.selectionEnd;
        editContext.updateSelection(e.selectionStart, e.selectionEnd);
        render();
      });

      editContext.addEventListener("characterboundsupdate", e => {
        const charBounds = [];
        for (let offset = e.rangeStart; offset < e.rangeEnd; offset++) {
          const charRange = getRangeFromStartEnd(offset, offset + 1);
          charBounds.push(charRange.getBoundingClientRect());
        }
        editContext.updateCharacterBounds(e.rangeStart, charBounds);
      });

      const imeHighlights = {
        "solid-thin": null, "solid-thick": null,
        "double-thin": null, "double-thick": null,
        "dotted-thin": null, "dotted-thick": null,
        "dashed-thin": null, "dashed-thick": null,
        "wavy-thin": null, "wavy-thick": null,
        "squiggle-thin": null, "squiggle-thick": null,
      };
      if (IS_CUSTOM_HIGHLIGHT_SUPPORTED) {
        for (const [key, value] of Object.entries(imeHighlights)) {
          imeHighlights[key] = new Highlight();
          CSS.highlights.set(`ime-format-${key}`, imeHighlights[key]);
        }
      }

      editContext.addEventListener("textformatupdate", e => {
        for (const value of Object.values(imeHighlights)) {
          value && value.clear();
        }
        const formats = e.getTextFormats();
        for (const format of formats) {
          const range = getRangeFromStartEnd(format.rangeStart, format.rangeEnd);
          const formatKey = `${format.underlineStyle.toLowerCase()}-${format.underlineThickness.toLowerCase()}`;
          const highlight = imeHighlights[formatKey];
          if (highlight) highlight.add(range);
        }
      });

      editContext.addEventListener("compositionstart", () => {
        editor.classList.add("is-composing");
      });
      editContext.addEventListener("compositionend", () => {
        editor.classList.remove("is-composing");
        for (const [key, value] of Object.entries(imeHighlights)) {
          value && value.clear();
        }
      });

      editor.addEventListener("keydown", e => {
        if (e.isComposing) return;

        const nextFocus = getKeyboardNavigationOffset(e);
        if (nextFocus === null) return;

        e.preventDefault();
        if (e.shiftKey) {
          updateTrackedSelection(selectionAnchor, nextFocus);
        } else {
          updateTrackedSelection(nextFocus, nextFocus);
        }
      });

      document.addEventListener("selectionchange", () => {
        const selection = document.getSelection();
        const startNode = selection.anchorNode;
        const endNode = selection.focusNode;

        // Ignore selections outside the editor (e.g. during blur)
        if (!startNode || !editor.contains(startNode)) return;
        if (!endNode || !editor.contains(endNode)) return;

        const startOffset = selection.anchorOffset;
        const endOffset = selection.focusOffset;

        let start = startOffset;
        let foundStart = false;
        let end = endOffset;
        let foundEnd = false;

        for (const span of editor.childNodes) {
          if (span.firstChild === startNode) foundStart = true;
          if (!foundStart) start += span.textContent.length;
          if (span.firstChild === endNode) foundEnd = true;
          if (!foundEnd) end += span.textContent.length;
        }

        selectionAnchor = clampOffset(start);
        selectionFocus = clampOffset(end);
        editContext.updateSelection(selectionAnchor, selectionFocus);
        updateSelectionBounds();
      });

      function updateTrackedSelection(anchor, focus) {
        selectionAnchor = clampOffset(anchor);
        selectionFocus = clampOffset(focus);
        editContext.updateSelection(selectionAnchor, selectionFocus);
        render();
      }

      function updateSelectionBounds() {
        const range = getRangeFromStartEnd(selectionFocus, selectionFocus);
        editContext.updateSelectionBounds(range.getBoundingClientRect());
      }

      function getKeyboardNavigationOffset(event) {
        const start = Math.min(editContext.selectionStart, editContext.selectionEnd);
        const end = Math.max(editContext.selectionStart, editContext.selectionEnd);
        const hasSelection = start !== end;
        const wordMove = event.ctrlKey || event.altKey;

        if (event.metaKey && event.key === "ArrowLeft") return 0;
        if (event.metaKey && event.key === "ArrowRight") return editContext.text.length;

        switch (event.key) {
          case "ArrowLeft":
            if (!event.shiftKey && hasSelection && !wordMove) return start;
            return wordMove ? previousWordOffset(selectionFocus) : previousTextOffset(selectionFocus);
          case "ArrowRight":
            if (!event.shiftKey && hasSelection && !wordMove) return end;
            return wordMove ? nextWordOffset(selectionFocus) : nextTextOffset(selectionFocus);
          case "Home":
            return 0;
          case "End":
            return editContext.text.length;
          default:
            return null;
        }
      }

      function clampOffset(offset) {
        return Math.max(0, Math.min(offset, editContext.text.length));
      }

      function previousTextOffset(offset) {
        const clamped = clampOffset(offset);
        if (clamped <= 0) return 0;

        const previous = editContext.text.charCodeAt(clamped - 1);
        if (previous >= 0xdc00 && previous <= 0xdfff && clamped > 1) {
          const beforePrevious = editContext.text.charCodeAt(clamped - 2);
          if (beforePrevious >= 0xd800 && beforePrevious <= 0xdbff) {
            return clamped - 2;
          }
        }
        return clamped - 1;
      }

      function nextTextOffset(offset) {
        const clamped = clampOffset(offset);
        if (clamped >= editContext.text.length) return editContext.text.length;

        const current = editContext.text.charCodeAt(clamped);
        if (current >= 0xd800 && current <= 0xdbff && clamped + 1 < editContext.text.length) {
          const next = editContext.text.charCodeAt(clamped + 1);
          if (next >= 0xdc00 && next <= 0xdfff) {
            return clamped + 2;
          }
        }
        return clamped + 1;
      }

      function previousWordOffset(offset) {
        let current = clampOffset(offset);
        while (current > 0 && isWhitespace(textBefore(current))) {
          current = previousTextOffset(current);
        }
        while (current > 0 && !isWhitespace(textBefore(current))) {
          current = previousTextOffset(current);
        }
        return current;
      }

      function nextWordOffset(offset) {
        let current = clampOffset(offset);
        while (current < editContext.text.length && isWhitespace(textAfter(current))) {
          current = nextTextOffset(current);
        }
        while (current < editContext.text.length && !isWhitespace(textAfter(current))) {
          current = nextTextOffset(current);
        }
        return current;
      }

      function textBefore(offset) {
        return editContext.text.slice(previousTextOffset(offset), clampOffset(offset));
      }

      function textAfter(offset) {
        return editContext.text.slice(clampOffset(offset), nextTextOffset(offset));
      }

      function isWhitespace(text) {
        return /\s/u.test(text);
      }

      function getPositionFromOffset(offset) {
        const clamped = clampOffset(offset);
        let currentPos = 0;

        for (const span of editor.childNodes) {
          const spanLength = span.textContent.length;
          if (clamped >= currentPos && clamped <= currentPos + spanLength) {
            return {
              node: span.firstChild || span,
              offset: clamped - currentPos,
            };
          }
          currentPos += spanLength;
        }

        const node = editor.lastChild ? editor.lastChild.firstChild || editor.lastChild : editor;
        return {
          node,
          offset: node === editor ? editor.childNodes.length : node.textContent.length,
        };
      }

      function getRangeFromStartEnd(start, end) {
        const rangeStart = getPositionFromOffset(start);
        const rangeEnd = getPositionFromOffset(end);
        const range = document.createRange();
        range.setStart(rangeStart.node, rangeStart.offset);
        range.setEnd(rangeEnd.node, rangeEnd.offset);
        return range;
      }

      render();
    }
  </script>
</body>

</html>
